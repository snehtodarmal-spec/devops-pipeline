# ─────────────────────────────────────────────────────────────
# SonarQube project configuration.
# This file tells the SonarQube scanner what to analyse
# and where to find source and test files.
# Lives in the repo root alongside the Jenkinsfile.
# ─────────────────────────────────────────────────────────────

# Unique identifier for this project in SonarQube.
# You'll see this name in the SonarQube dashboard at localhost:9000.
sonar.projectKey=devops-pipeline-app
sonar.projectName=DevOps Pipeline App
sonar.projectVersion=1.0

# Tell the scanner where your source code lives
sonar.sources=app/src

# Tell the scanner where your tests live so it
# can calculate code coverage (from Jest's lcov report)
sonar.tests=app/test

# Jest outputs coverage in lcov format when run with --coverage.
# This path tells SonarQube where to find that report so it
# can display coverage % in the dashboard.
sonar.javascript.lcov.reportPaths=app/coverage/lcov.info

# Language hint — SonarQube auto-detects but explicit is safer
sonar.language=js

# Encoding — always specify to avoid platform-dependent issues
sonar.sourceEncoding=UTF-8

# Exclusions — don't scan dependencies or generated files
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.test.js
